name: FPL Sniper Data Fetch

on:
  schedule:
    # Runs at the top of every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows you to trigger it manually from the GitHub UI for testing

jobs:
  snipe:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium
        
      - name: Check FPL Deadline (Sniper Window)
        id: sniper
        # This will exit with 1 if it's not the right time, failing this step.
        # We use continue-on-error so the workflow just stops gracefully instead of sending you a massive "FAILURE" email every hour.
        continue-on-error: true
        run: npx tsx scripts/check-deadline.ts
        
      # The subsequent steps only run if the sniper step exited with 0 (SUCCESS)
      - name: Fetch FPLForm Data
        if: steps.sniper.outcome == 'success'
        run: npx tsx scripts/fetch-xp.ts
        
      - name: Commit and Push New Data
        if: steps.sniper.outcome == 'success'
        run: |
          git config --global user.name "FPL Sniper Bot"
          git config --global user.email "bot@quistech.com"
          git add data/fplform.csv
          git commit -m "Auto-update: Scraped latest FPLForm predictions 2 hours before deadline"
          git push
